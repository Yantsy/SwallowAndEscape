name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev
      
      - name: Build Linux package
        run: |
          chmod +x build-simple-package.sh
          ./build-simple-package.sh
      
      - name: Upload Linux package
        uses: actions/upload-artifact@v3
        with:
          name: SwallowAndEscape-Linux
          path: dist/SwallowAndEscape-*-Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            make
      
      - name: Build Windows version
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          cd ..
          
          # 创建发行包
          mkdir -p dist/SwallowAndEscape-Windows
          cp build/SwallowAndEscape.exe dist/SwallowAndEscape-Windows/
          cp -r assets dist/SwallowAndEscape-Windows/
          
          # 复制DLL
          cp /mingw64/bin/SDL2.dll dist/SwallowAndEscape-Windows/
          cp /mingw64/bin/SDL2_image.dll dist/SwallowAndEscape-Windows/
          cp /mingw64/bin/SDL2_mixer.dll dist/SwallowAndEscape-Windows/
          cp /mingw64/bin/*.dll dist/SwallowAndEscape-Windows/ 2>/dev/null || true
          
          # 打包
          cd dist
          7z a SwallowAndEscape-1.0.0-Windows.zip SwallowAndEscape-Windows
      
      - name: Upload Windows package
        uses: actions/upload-artifact@v3
        with:
          name: SwallowAndEscape-Windows
          path: dist/SwallowAndEscape-*-Windows.zip

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SwallowAndEscape-Linux/*
            SwallowAndEscape-Windows/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
